name: "Afegir Pokémon"
description: "Afegeix un Pokémon a la Pokédex personal"
title: "[Pokédex] Afegir: "
labels: ["add-pokemon"]
body:
  - type: input
    id: nom
    attributes:
      label: Nom
      description: "Ex.: Leafeon, Gengar, Typhlosion (Hisui)"
      placeholder: "Nom del Pokémon"
    validations:
      required: true

  -   - type: dropdown
    id: joc
    attributes:
      label: Joc
      multiple: false
      options:
        - Pokémon Rojo (1996)
        - Pokémon Verde (1996)
        - Pokémon Azul (1996)
        - Pokémon Amarillo (1998)
        - Pokémon Oro (1999)
        - Pokémon Plata (1999)
        - Pokémon Cristal (2000)
        - Pokémon Rubí (2002)
        - Pokémon Zafiro (2002)
        - Pokémon Rojo Fuego (2004)
        - Pokémon Verde Hoja (2004)
        - Pokémon Esmeralda (2004)
        - Pokémon Diamante (2006)
        - Pokémon Perla (2006)
        - Pokémon Platino (2008)
        - Pokémon Oro HeartGold (2009)
        - Pokémon Plata SoulSilver (2009)
        - Pokémon Negro (2010)
        - Pokémon Blanco (2010)
        - Pokémon Negro 2 (2012)
        - Pokémon Blanco 2 (2012)
        - Pokemon X (2013)
        - Pokémon Y (2013)
        - Pokémon Rubí Omega (2014)
        - Pokémon Zafiro Alfa (2014)
        - Pokémon Sol (2016)
        - Pokémon Luna (2016)
        - Pokémon Go (2016)
        - Pokémon Ultrasol (2017)
        - Pokémon Ultraluna (2017)
        - Pokémon: Let's Go, Pikachu! (2018)
        - Pokémon: Let's Go, Eevee! (2018)
        - Pokémon Espada (2019)
        - Pokémon Escudo (2019)
        - Pokémon Diamante Brillante (2021)
        - Pokémon Perla Reluciente (2021)
        - Leyendas Pokémon: Arceus (2022)
        - Pokémon Escarlata (2022)
        - Pokémon Púrpura (2022)
        - Leyendas Pokémon: Z-A (2025)
    validations:
      required: true

  -   - type: dropdown
    id: tipus
    attributes:
      label: Tipus
      description: "Selecciona 1 o 2 tipus"
      multiple: true
      options:
        - Acer
        - Aigua
        - Bitxo
        - Drac
        - Elèctric
        - Fantasma
        - Foc
        - Fada
        - Gel
        - Lluita
        - Normal
        - Planta
        - Psíquic
        - Roca
        - Sinistre
        - Terra
        - Verí
        - Volador
    validations:
      required: false
  
    - type: dropdown
    id: naturalesa
    attributes:
      label: Naturalesa
      multiple: false
      options:
        - Fuerte (Hardy)
        - Osada (Bold)
        - Modesta (Modest)
        - Serena (Calm)
        - Miedosa (Timid)
        - Huraña (Lonely)
        - Dócil (Docile)
        - Afable (Mild)
        - Amable (Gentle)
        - Activa (Hasty)
        - Firme (Adamant)
        - Agitada (Impish)
        - Tímida (Bashful)
        - Cauta (Careful)
        - Alegre (Jolly)
        - Pícara (Naughty)
        - Floja (Lax)
        - Alocada (Rash)
        - Rara (Quirky)
        - Ingenua (Naive)
        - Audaz (Brave)
        - Plácida (Relaxed)
        - Mansa (Quiet)
        - Grosera (Sassy)
        - Seria (Serious)
    validations:
      required: false

  - type: input
    id: rol
    attributes:
      label: Rol
      description: 'Ex.: "atacant físic", "atacant especial", "suport"...'
      placeholder: "atacant especial"
    validations:
      required: false

  - type: textarea
    id: moviments
    attributes:
      label: Moviments (un per línia o separats per coma)
      placeholder: "Lanzallamas\nInfortunio\nRapidez\nRodar"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: "Qualsevol anotació"
    validations:
      required: false