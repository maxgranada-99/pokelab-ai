name: Afegir Pokémon a la Pokédex

on:
  issues:
    types: [opened]

jobs:
  add_pokemon:
    if: contains(github.event.issue.labels.*.name, 'add-pokemon')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Actualitza pokedex.json a partir de la issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const issue = context.payload.issue;
            const body = issue.body || "";

            function pickField(md, label) {
              // Busca:
              // ### Label
              // valor
              const re = new RegExp(`^###\\s+${label}\\s*$([\\s\\S]*?)(?=^###\\s+|\\Z)`, "m");
              const m = md.match(re);
              if (!m) return "";
              return (m[1] || "").trim();
            }

            function splitList(s) {
              if (!s) return [];
              const parts = s
                .split(/\r?\n|,/)
                .map(x => x.trim())
                .filter(Boolean)
                .filter(x => x !== "_No response_");
              return [...new Set(parts)];
            }

            function slugify(s) {
              return (s ?? "")
                .toString()
                .trim()
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[’']/g, "")
                .replace(/[^a-z0-9\s-]/g, "")
                .replace(/\s+/g, "-")
                .replace(/-+/g, "-");
            }

            const TYPE_CA = {
              normal: "Normal",
              fire: "Foc",
              water: "Aigua",
              electric: "Elèctric",
              grass: "Planta",
              ice: "Gel",
              fighting: "Lluita",
              poison: "Verí",
              ground: "Terra",
              flying: "Volador",
              psychic: "Psíquic",
              bug: "Bitxo",
              rock: "Roca",
              ghost: "Fantasma",
              dragon: "Drac",
              dark: "Sinistre",
              steel: "Acer",
              fairy: "Fada",
            };

            // Camps del formulari (issue template)
            const nomRaw = pickField(body, "Nom");
            const joc = pickField(body, "Joc");
            const regio = pickField(body, "Regió");
            const naturalesa = pickField(body, "Naturalesa");
            const movimentsRaw = pickField(body, "Moviments (un per línia o separats per coma)") || pickField(body, "Moviments");
            const notes = pickField(body, "Notes");

            if (!nomRaw) core.setFailed("Falta el camp 'Nom'");

            // Detecta forma amb parèntesis: "Typhlosion (Hisui)"
            let baseName = nomRaw;
            let forma = "";
            const m = nomRaw.match(/^(.*?)\s*\((.*?)\)\s*$/);
            if (m) {
              baseName = (m[1] || "").trim();
              forma = (m[2] || "").trim();
            }

            const baseSlug = slugify(baseName);
            const formSlug = forma ? slugify(forma) : "";
            const pokeapiName = formSlug ? `${baseSlug}-${formSlug}` : baseSlug;

            async function fetchJson(url) {
              const res = await fetch(url, { headers: { "User-Agent": "pokelab-ai" } });
              if (!res.ok) throw new Error(`HTTP ${res.status} a ${url}`);
              return await res.json();
            }

            // 1) DEX nacional = species id del baseName (sempre)
            // 2) pokeapiId = pokemon id del pokeapiName (forma o base)
            // 3) tipus = del pokemon (forma o base)
            let dex = null;
            let pokeapiId = null;
            let tipus = [];

            try {
              const species = await fetchJson(`https://pokeapi.co/api/v2/pokemon-species/${baseSlug}`);
              dex = species.id;
            } catch (e) {
              core.warning(`No he pogut obtenir species per ${baseSlug}: ${e.message}`);
            }

            try {
              const pkm = await fetchJson(`https://pokeapi.co/api/v2/pokemon/${pokeapiName}`);
              pokeapiId = pkm.id;
              tipus = (pkm.types || [])
                .sort((a,b) => (a.slot ?? 99) - (b.slot ?? 99))
                .map(t => TYPE_CA[t.type?.name] || t.type?.name)
                .filter(Boolean);
            } catch (e) {
              core.warning(`No he pogut obtenir pokemon per ${pokeapiName}: ${e.message}`);
            }

            // Construeix entrada
            const entry = {
              nom: nomRaw,
              baseName,
              forma: forma || "",
              dex: dex ?? null,
              pokeapiId: pokeapiId ?? null,
              regio: (regio || (forma || "")) || "",
              joc: joc || "",
              naturalesa: naturalesa || "",
              moviments: splitList(movimentsRaw),
              notes: notes || "",
              tipus,
            };

            // Llegeix pokedex.json (array)
            const path = "data/pokedex.json";
            const raw = fs.existsSync(path) ? fs.readFileSync(path, "utf8").trim() : "[]";
            let data;

            try {
              data = JSON.parse(raw || "[]");
            } catch (e) {
              core.setFailed(`pokedex.json no és JSON vàlid: ${e.message}`);
              return;
            }

            if (!Array.isArray(data)) {
              core.setFailed("pokedex.json ha de ser un ARRAY ([])");
              return;
            }

            // Evita duplicats pel mateix (base+forma+joc)
            const key = `${slugify(entry.baseName)}|${slugify(entry.forma)}|${slugify(entry.joc)}`;
            const exists = data.some(p => `${slugify(p.baseName || p.nom)}|${slugify(p.forma)}|${slugify(p.joc)}` === key);

            if (exists) {
              console.log("Ja existeix:", key);
            } else {
              data.push(entry);
              fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
              console.log("Entrada afegida:", entry);
            }

      - name: Commit i push si hi ha canvis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pokedex.json
          git diff --cached --quiet && echo "No hi ha canvis" && exit 0
          git commit -m "chore: afegeix Pokémon via issue (pokeapiId per formes)"
          git push