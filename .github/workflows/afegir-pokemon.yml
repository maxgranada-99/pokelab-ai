name: Afegir Pokémon a la Pokédex

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  add_pokemon:
    if: contains(github.event.issue.title, '[Pokédex] Afegir:')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "data/pokedex.json";

            const issue = context.payload.issue;
            const body = issue.body || "";

            function pickField(text, fieldName) {
              const regex = new RegExp(`### ${fieldName}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`, "i");
              const match = text.match(regex);
              return match ? match[1].trim() : "";
            }

            function splitList(s) {
              if (!s) return [];
              return s
                .split(/[\n,]/)
                .map(x => x.trim())
                .filter(Boolean)
                .filter(x => x !== "_No response_");
            }

            function slugifyName(nom) {
              return nom
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .trim()
                .replace(/\(.*?\)/g, "")
                .replace(/[^a-z0-9\s-]/g, "")
                .replace(/\s+/g, "-");
            }

            const generationToRegion = {
              "generation-i": "Kanto",
              "generation-ii": "Johto",
              "generation-iii": "Hoenn",
              "generation-iv": "Sinnoh",
              "generation-v": "Unova",
              "generation-vi": "Kalos",
              "generation-vii": "Alola",
              "generation-viii": "Galar",
              "generation-ix": "Paldea"
            };

            const nom = pickField(body, "Nom");
            const joc = pickField(body, "Joc");
            const naturalesa = pickField(body, "Naturalesa");
            const movimentsRaw = pickField(body, "Moviments");
            const notes = pickField(body, "Notes");

            const slug = slugifyName(nom);

            let dex = null;
            let pokeapi_id = null;
            let tipus = [];
            let regio = "";

            try {
              const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`);
              if (res.ok) {
                const pj = await res.json();
                pokeapi_id = pj.id;

                // Tipus
                tipus = (pj.types || [])
                  .sort((a,b) => a.slot - b.slot)
                  .map(t => t.type.name);

                // Species (dex real + generation)
                if (pj.species?.url) {
                  const sRes = await fetch(pj.species.url);
                  if (sRes.ok) {
                    const sData = await sRes.json();
                    dex = sData.id;

                    const genName = sData.generation?.name;
                    regio = generationToRegion[genName] || genName;
                  }
                }

                // Forçar Hisui si és forma Hisui
                if (nom.toLowerCase().includes("hisui")) {
                  regio = "Hisui";
                }
              }
            } catch (e) {
              console.log("Error PokéAPI:", e);
            }

            const entry = {
              nom,
              slug,
              dex,
              pokeapi_id,
              tipus,
              regio,
              naturalesa: naturalesa || "",
              joc: joc || "",
              moviments: splitList(movimentsRaw),
              notes: notes === "_No response_" ? "" : notes
            };

            let data = [];
            if (fs.existsSync(path)) {
              data = JSON.parse(fs.readFileSync(path, "utf8"));
            }

            data.push(entry);

            fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");