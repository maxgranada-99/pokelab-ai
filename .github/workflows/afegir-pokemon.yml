name: Afegir Pokémon a la Pokédex

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  add_pokemon:
    if: contains(github.event.issue.labels.*.name, 'add-pokemon')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Actualitza data/pokedex.json des de l'issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node --input-type=commonjs <<'NODE'
          const fs = require("fs");

          const body = process.env.ISSUE_BODY || "";

          function pickField(md, label) {
            const re = new RegExp(`^###\\s+${label}\\s*$([\\s\\S]*?)(?=^###\\s+|\\Z)`, "m");
            const m = md.match(re);
            return (m ? (m[1] || "") : "").trim();
          }

          function splitList(s) {
            if (!s) return [];
            return [...new Set(
              s.split(/\r?\n|,/).map(x => x.trim()).filter(Boolean).filter(x => x !== "_No response_")
            )];
          }

          function slugify(s) {
            return (s ?? "")
              .toString()
              .trim()
              .toLowerCase()
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "")
              .replace(/[’']/g, "")
              .replace(/[^a-z0-9\s-]/g, "")
              .replace(/\s+/g, "-")
              .replace(/-+/g, "-");
          }

          const TYPE_CA = {
            normal: "Normal",
            fire: "Foc",
            water: "Aigua",
            electric: "Elèctric",
            grass: "Planta",
            ice: "Gel",
            fighting: "Lluita",
            poison: "Verí",
            ground: "Terra",
            flying: "Volador",
            psychic: "Psíquic",
            bug: "Bitxo",
            rock: "Roca",
            ghost: "Fantasma",
            dragon: "Drac",
            dark: "Sinistre",
            steel: "Acer",
            fairy: "Fada",
          };

          async function fetchJson(url) {
            const res = await fetch(url, { headers: { "User-Agent": "pokelab-ai" } });
            if (!res.ok) throw new Error(`HTTP ${res.status} a ${url}`);
            return await res.json();
          }

          const nomRaw = pickField(body, "Nom");
          const regioRaw = pickField(body, "Regió");
          const joc = pickField(body, "Joc");
          const naturalesa = pickField(body, "Naturalesa");
          const movimentsRaw = pickField(body, "Moviments");
          const notes = pickField(body, "Notes");

          if (!nomRaw) {
            console.log("Falta el camp Nom.");
            process.exit(0);
          }

          let baseName = nomRaw;
          let forma = "";
          const m = nomRaw.match(/^(.*?)\s*\((.*?)\)\s*$/);
          if (m) {
            baseName = (m[1] || "").trim();
            forma = (m[2] || "").trim();
          }

          const regio = (regioRaw || "").trim();
          const regionalForms = new Set(["Alola", "Galar", "Hisui", "Paldea"]);
          if (!forma && regionalForms.has(regio)) {
            forma = regio;
          }

          const baseSlug = slugify(baseName);
          const formSlug = forma ? slugify(forma) : "";
          const pokeSlug = formSlug ? `${baseSlug}-${formSlug}` : baseSlug;

          let dex = null;
          let pokeapiId = null;
          let tipus = [];

          try {
            const species = await fetchJson(`https://pokeapi.co/api/v2/pokemon-species/${baseSlug}`);
            dex = species.id ?? null;
          } catch (e) {
            console.log(`WARN: no puc obtenir dex species per ${baseSlug}: ${e.message}`);
          }

          try {
            const pkm = await fetchJson(`https://pokeapi.co/api/v2/pokemon/${pokeSlug}`);
            pokeapiId = pkm.id ?? null;
            tipus = (pkm.types || [])
              .sort((a,b) => (a.slot ?? 99) - (b.slot ?? 99))
              .map(t => TYPE_CA[t.type?.name] || t.type?.name)
              .filter(Boolean);
          } catch (e) {
            console.log(`WARN: no puc obtenir pokemon per ${pokeSlug}: ${e.message}`);
            try {
              const pkm2 = await fetchJson(`https://pokeapi.co/api/v2/pokemon/${baseSlug}`);
              pokeapiId = pkm2.id ?? null;
              tipus = (pkm2.types || [])
                .sort((a,b) => (a.slot ?? 99) - (b.slot ?? 99))
                .map(t => TYPE_CA[t.type?.name] || t.type?.name)
                .filter(Boolean);
            } catch (e2) {
              console.log(`WARN: tampoc puc obtenir pokemon base per ${baseSlug}: ${e2.message}`);
            }
          }

          const entry = {
            nom: nomRaw.trim(),
            baseName,
            forma: forma || "",
            dex: dex ?? null,
            pokeapiId: pokeapiId ?? null,
            regio: regio === "Normal (sense forma regional)" ? "" : regio,
            joc: joc || "",
            naturalesa: naturalesa || "",
            moviments: splitList(movimentsRaw),
            notes: notes || "",
            tipus
          };

          const path = "data/pokedex.json";
          const raw = fs.existsSync(path) ? fs.readFileSync(path, "utf8").trim() : "[]";
          let data = JSON.parse(raw || "[]");
          if (!Array.isArray(data)) data = [];

          const key = `${slugify(entry.baseName)}|${slugify(entry.forma)}|${slugify(entry.joc)}`;
          const exists = data.some(p => `${slugify(p.baseName || p.nom)}|${slugify(p.forma)}|${slugify(p.joc)}` === key);

          if (exists) {
            console.log("Ja existeix, no afegeixo duplicat:", key);
          } else {
            data.push(entry);
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
            console.log("Entrada afegida:", entry);
          }
          NODE

      - name: Commit i push si hi ha canvis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pokedex.json
          git diff --cached --quiet && echo "No hi ha canvis" && exit 0
          git commit -m "chore: afegeix pokemon via issue (regio->forma + pokeapiId)"
          git push