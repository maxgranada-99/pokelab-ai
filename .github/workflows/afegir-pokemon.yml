name: Afegir Pokémon a la Pokédex

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  add_pokemon:
    if: contains(github.event.issue.title, '[Pokédex] Afegir:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Afegir entrada a data/pokedex.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "data/pokedex.json";

            const issue = context.payload.issue;
            const body = issue.body || "";

            function pickField(text, fieldName) {
              const regex = new RegExp(`### ${fieldName}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`, "i");
              const match = text.match(regex);
              return match ? match[1].trim() : "";
            }

            function splitList(s) {
              if (!s) return [];
              return s
                .split(/[\n,]/)
                .map(x => x.trim())
                .filter(Boolean);
            }

            function slugifyName(nom) {
              return nom
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .trim()
                .replace(/\(.*?\)/g, "")
                .replace(/[^a-z0-9\s-]/g, "")
                .replace(/\s+/g, "-");
            }

            const nom = pickField(body, "Nom");
            const joc = pickField(body, "Joc");
            const naturalesa = pickField(body, "Naturalesa");
            const movimentsRaw = pickField(body, "Moviments");
            const notes = pickField(body, "Notes");

            if (!nom) {
              core.setFailed("Falta el camp 'Nom' a la issue.");
              return;
            }

            const slug = slugifyName(nom);

            let dex = null;
            let tipus = [];

            try {
              const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`);
              if (res.ok) {
                const pj = await res.json();
                dex = pj.id;
                tipus = (pj.types || [])
                  .map(t => (t.type && t.type.name ? t.type.name : ""))
                  .filter(Boolean);
              } else {
                console.log("PokéAPI no ha trobat el Pokémon:", slug, "status:", res.status);
              }
            } catch (e) {
              console.log("Error cridant PokéAPI:", e);
            }

            const entry = {
              nom,
              slug,
              dex: dex || null,
              tipus,
              naturalesa: naturalesa || "",
              joc: joc || "",
              moviments: splitList(movimentsRaw),
              notes: notes || ""
            };

            let data = [];
            if (fs.existsSync(path)) {
              data = JSON.parse(fs.readFileSync(path, "utf8"));
            }

            // Evita duplicats pel mateix nom + joc (ajusta-ho si vols un altre criteri)
            const key = `${entry.nom}__${entry.joc}`;
            const exists = data.some(p => `${p.nom}__${p.joc}` === key);
            if (exists) {
              console.log("Ja existeix aquesta entrada:", key);
              return;
            }

            data.push(entry);
            fs.writeFileSync(path, JSON.stringify(data, null, 2));
            console.log("Entrada afegida:", entry);

      - name: Commit i push si hi ha canvis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pokedex.json
          git diff --cached --quiet && echo "No hi ha canvis" && exit 0
          git commit -m "Afegir Pokémon via issue"
          git push