name: Afegir Pokémon a la Pokédex

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

jobs:
  add_pokemon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Actualitza data/pokedex.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const issue = context.payload.issue;
            const body = issue.body || "";

            function pickField(text, fieldName) {
              const regex = new RegExp(`### ${fieldName}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`, "i");
              const match = text.match(regex);
              return match ? match[1].trim() : "";
            }

            function splitList(s) {
              if (!s) return [];
              const parts = s
                .split(/[\n,]/)
                .map(x => x.trim())
                .filter(Boolean);
              return [...new Set(parts)];
            }

            function slugifyName(nom) {
              return nom
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .trim()
                .replace(/\(.*?\)/g, "")
                .replace(/[^a-z0-9\s-]/g, "")
                .replace(/\s+/g, "-");
            }

            const nom = pickField(body, "Nom");
            const joc = pickField(body, "Joc");
            const tipusRaw = pickField(body, "Tipus");
            const rol = pickField(body, "Rol");
            const naturalesa = pickField(body, "Naturalesa");
            const movimentsRaw = pickField(body, "Moviments");
            const notes = pickField(body, "Notes");

            const slug = slugifyName(nom);

            let dex = null;
            try {
              const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`);
              if (res.ok) {
                const pj = await res.json();
                dex = pj.id;
              }
            } catch (e) {
              console.log("No s'ha pogut obtenir el dex:", e);
            }

            const entry = {
              nom,
              slug,
              dex: dex || null,
              tipus: splitList(tipusRaw),
              rol: rol || "",
              naturalesa: naturalesa || "",
              joc,
              moviments: splitList(movimentsRaw),
              notes: notes || ""
            };

            const path = "data/pokedex.json";
            let data = [];

            if (fs.existsSync(path)) {
              data = JSON.parse(fs.readFileSync(path, "utf8"));
            }

            data.push(entry);

            fs.writeFileSync(path, JSON.stringify(data, null, 2));

            // Marca que hi ha canvi per al següent pas
            core.setOutput("did_change", "true");

      - name: Commit i push
        run: |
          if git diff --quiet; then
            echo "No hi ha canvis a commitejar."
            exit 0
          fi
          git config user.name "pokelab-bot"
          git config user.email "pokelab-bot@users.noreply.github.com"
          git add data/pokedex.json
          git commit -m "Afegir Pokémon via Issue"
          git push

      - name: Comenta i tanca la Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: "✅ Pokémon afegit a `data/pokedex.json`. Ja ho veuràs reflectit a la web."
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: "closed"
            });