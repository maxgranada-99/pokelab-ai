name: Afegir Pokémon a la Pokédex

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: read

jobs:
  add_pokemon:
    if: contains(github.event.issue.labels.*.name, 'add-pokemon')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Actualitza data/pokedex.json des de l'issue (upsert)
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node --input-type=commonjs <<'NODE'
          const fs = require("fs");

          const body = process.env.ISSUE_BODY || "";

          function pickField(md, label) {
            const re = new RegExp(`^###\\s+${label}\\s*$([\\s\\S]*?)(?=^###\\s+|\\Z)`, "m");
            const m = md.match(re);
            return (m ? (m[1] || "") : "").trim();
          }

          function splitList(s) {
            if (!s) return [];
            return [...new Set(
              s.split(/\r?\n|,/)
                .map(x => x.trim())
                .filter(Boolean)
                .filter(x => x !== "_No response_")
            )];
          }

          function slugify(s) {
            return (s ?? "")
              .toString()
              .trim()
              .toLowerCase()
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "")
              .replace(/[’']/g, "")
              .replace(/[^a-z0-9\s-]/g, "")
              .replace(/\s+/g, "-")
              .replace(/-+/g, "-");
          }

          const TYPE_CA = {
            normal: "Normal",
            fire: "Foc",
            water: "Aigua",
            electric: "Elèctric",
            grass: "Planta",
            ice: "Gel",
            fighting: "Lluita",
            poison: "Verí",
            ground: "Terra",
            flying: "Volador",
            psychic: "Psíquic",
            bug: "Bitxo",
            rock: "Roca",
            ghost: "Fantasma",
            dragon: "Drac",
            dark: "Sinistre",
            steel: "Acer",
            fairy: "Fada",
          };

          async function fetchJson(url) {
            const res = await fetch(url, { headers: { "User-Agent": "pokelab-ai" } });
            if (!res.ok) throw new Error(`HTTP ${res.status} a ${url}`);
            return await res.json();
          }

          async function main() {
            const nomRaw = pickField(body, "Nom");
            const formaRaw = pickField(body, "Regió") || pickField(body, "Forma regional");
            const joc = pickField(body, "Joc");
            const naturalesa = pickField(body, "Naturalesa");
            const rol = pickField(body, "Rol");
            const movimentsRaw = pickField(body, "Moviments");
            const notes = pickField(body, "Notes");

            if (!nomRaw) {
              console.log("Falta el camp Nom.");
              return;
            }

            // Nom amb (Hisui) etc.
            let baseName = nomRaw.trim();
            let forma = "";
            const m = nomRaw.match(/^(.*?)\s*\((.*?)\)\s*$/);
            if (m) {
              baseName = (m[1] || "").trim();
              forma = (m[2] || "").trim();
            }

            // Regió del formulari: si és una regió amb forma regional i no hi ha forma al nom, la convertim a forma
            const formaSel = (formaRaw || "").trim(); // "Base" | "Alola" | "Galar" | "Hisui" | "Paldea"
            const regionalForms = new Set(["Alola", "Galar", "Hisui", "Paldea"]);

            // Si el nom NO porta parèntesis, però l’usuari ha triat forma regional, ho fem servir com a "forma"
            if (!forma && regionalForms.has(formaSel)) {
              forma = formaSel;
            }

            // Mantindrem el camp "regio" com fins ara (per la UI actual):
            // - "Normal" si és Base
            // - "Alola/Galar/Hisui/Paldea" si és variant
            const regio = formaSel || "Base";

            const baseSlug = slugify(baseName);
            const formSlug = forma ? slugify(forma) : "";
            const pokeSlug = formSlug ? `${baseSlug}-${formSlug}` : baseSlug;

            let dex = null;       // species id (base)
            let pokeapiId = null; // pokemon id (forma)
            let tipus = [];

            try {
              const species = await fetchJson(`https://pokeapi.co/api/v2/pokemon-species/${baseSlug}`);
              dex = species.id ?? null;
            } catch (e) {
              console.log(`WARN: no puc obtenir dex species per ${baseSlug}: ${e.message}`);
            }

            try {
              const pkm = await fetchJson(`https://pokeapi.co/api/v2/pokemon/${pokeSlug}`);
              pokeapiId = pkm.id ?? null;
              tipus = (pkm.types || [])
                .sort((a,b) => (a.slot ?? 99) - (b.slot ?? 99))
                .map(t => TYPE_CA[t.type?.name] || t.type?.name)
                .filter(Boolean);
            } catch (e) {
              console.log(`WARN: no puc obtenir pokemon per ${pokeSlug}: ${e.message}`);
              try {
                const pkm2 = await fetchJson(`https://pokeapi.co/api/v2/pokemon/${baseSlug}`);
                pokeapiId = pkm2.id ?? null;
                tipus = (pkm2.types || [])
                  .sort((a,b) => (a.slot ?? 99) - (b.slot ?? 99))
                  .map(t => TYPE_CA[t.type?.name] || t.type?.name)
                  .filter(Boolean);
              } catch (e2) {
                console.log(`WARN: tampoc puc obtenir pokemon base per ${baseSlug}: ${e2.message}`);
              }
            }

            const entry = {
              nom: nomRaw.trim(),
              baseName,
              forma: forma || "",
              dex: dex ?? null,
              pokeapiId: pokeapiId ?? null,
              regio,
              joc: joc || "",
              naturalesa: naturalesa || "",
              rol: rol || "",
              moviments: splitList(movimentsRaw),
              notes: notes || "",
              tipus
            };

            const path = "data/pokedex.json";
            const raw = fs.existsSync(path) ? fs.readFileSync(path, "utf8").trim() : "[]";
            let data = JSON.parse(raw || "[]");
            if (!Array.isArray(data)) data = [];

            // Upsert: base+forma+joc
            const key = `${slugify(entry.baseName)}|${slugify(entry.forma)}|${slugify(entry.joc)}`;
            const idx = data.findIndex(p => {
              const k = `${slugify(p.baseName || p.nom)}|${slugify(p.forma)}|${slugify(p.joc)}`;
              return k === key;
            });

            if (idx >= 0) {
              data[idx] = { ...data[idx], ...entry };
              console.log("Entrada actualitzada:", entry);
            } else {
              data.push(entry);
              console.log("Entrada afegida:", entry);
            }

            fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          NODE

      - name: Commit i push si hi ha canvis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pokedex.json
          git diff --cached --quiet && echo "No hi ha canvis" && exit 0
          git commit -m "chore: afegeix/actualitza pokemon via issue"
          git push