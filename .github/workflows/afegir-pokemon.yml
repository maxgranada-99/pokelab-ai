name: Afegir Pokémon a la Pokédex

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  add_pokemon:
    if: contains(github.event.issue.title, '[Pokédex] Afegir:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Afegir entrada a data/pokedex.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "data/pokedex.json";

            const issue = context.payload.issue;
            const body = issue.body || "";

            function pickField(text, fieldName) {
              const regex = new RegExp(`### ${fieldName}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`, "i");
              const match = text.match(regex);
              return match ? match[1].trim() : "";
            }

            function splitList(s) {
              if (!s) return [];
              return s
                .split(/[\n,]/)
                .map(x => x.trim())
                .filter(Boolean)
                .filter(x => x !== "_No response_");
            }

            function slugifyName(nom) {
              return nom
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .trim()
                .replace(/\(.*?\)/g, "")
                .replace(/[^a-z0-9\s-]/g, "")
                .replace(/\s+/g, "-");
            }

            const typeMap = {
              normal: "Normal",
              fire: "Foc",
              water: "Aigua",
              electric: "Elèctric",
              grass: "Planta",
              ice: "Gel",
              fighting: "Lluita",
              poison: "Verí",
              ground: "Terra",
              flying: "Volador",
              psychic: "Psíquic",
              bug: "Bitxo",
              rock: "Roca",
              ghost: "Fantasma",
              dragon: "Drac",
              dark: "Sinistre",
              steel: "Acer",
              fairy: "Fada"
            };

            const nom = pickField(body, "Nom");
            const joc = pickField(body, "Joc");
            const naturalesa = pickField(body, "Naturalesa");
            const movimentsRaw = pickField(body, "Moviments");
            const notes = pickField(body, "Notes");

            if (!nom) {
              core.setFailed("Falta el camp 'Nom' a la issue.");
              return;
            }

            const slug = slugifyName(nom);

            let dex = null;         // National Dex real (pokemon-species)
            let pokeapi_id = null;  // ID del /pokemon/ (formes incloses)
            let tipus = [];

            try {
              const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`);
              if (res.ok) {
                const pj = await res.json();
                pokeapi_id = pj.id;

                // tipus (de /pokemon/)
                const typesEn = (pj.types || [])
                  .sort((a,b) => a.slot - b.slot)
                  .map(t => t.type?.name)
                  .filter(Boolean);

                tipus = typesEn.map(t => typeMap[t] ?? t);

                // dex real (de /pokemon-species/)
                if (pj.species?.url) {
                  const sRes = await fetch(pj.species.url);
                  if (sRes.ok) {
                    const sData = await sRes.json();
                    dex = sData.id; // National Dex
                  }
                }
              } else {
                console.log("PokéAPI no ha trobat el Pokémon:", slug, "status:", res.status);
              }
            } catch (e) {
              console.log("Error cridant PokéAPI:", e);
            }

            const entry = {
              nom,
              slug,
              dex: dex || null,
              pokeapi_id: pokeapi_id || null,
              tipus,
              naturalesa: naturalesa || "",
              joc: joc || "",
              moviments: splitList(movimentsRaw),
              notes: notes || ""
            };

            let data = [];
            if (fs.existsSync(path)) {
              data = JSON.parse(fs.readFileSync(path, "utf8"));
            }

            // evita duplicats simples (nom + joc)
            const key = `${entry.nom}__${entry.joc}`;
            const exists = data.some(p => `${p.nom}__${p.joc}` === key);
            if (exists) {
              console.log("Ja existeix aquesta entrada:", key);
              return;
            }

            data.push(entry);
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
            console.log("Entrada afegida:", entry);

      - name: Commit i push si hi ha canvis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pokedex.json
          git diff --cached --quiet && echo "No hi ha canvis" && exit 0
          git commit -m "Afegir Pokémon via issue"
          git push