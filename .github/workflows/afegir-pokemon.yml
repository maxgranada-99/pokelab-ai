name: Afegir Pokémon a la Pokédex

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: read

jobs:
  add_pokemon:
    if: contains(github.event.issue.labels.*.name, 'add-pokemon')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Actualitza data/pokedex.json des de l'issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node - <<'NODE'
          const fs = require("fs");

          const body = process.env.ISSUE_BODY || "";

          function pickField(text, label) {
            // Github issue form sol renderitzar "Label\n<valor>" (separat per línies)
            // i pot acabar amb una línia en blanc.
            const re = new RegExp(`(^|\\n)${label}\\s*\\n([^\\n]*)`, "i");
            const m = text.match(re);
            return (m ? m[2] : "").trim();
          }

          function splitList(s) {
            if (!s) return [];
            const parts = s
              .split(/\n|,/)
              .map(x => x.trim())
              .filter(Boolean);
            return [...new Set(parts)];
          }

          function normalize(s) {
            return (s ?? "")
              .toString()
              .trim()
              .toLowerCase()
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "");
          }

          function slugifyName(nom) {
            // "Typhlosion (Hisui)" -> "typhlosion"
            return normalize(nom)
              .replace(/\(.*?\)/g, "")
              .trim()
              .replace(/[^a-z0-9\s-]/g, "")
              .replace(/\s+/g, "-");
          }

          function slugifyForma(forma) {
            // "Hisui" -> "hisui"
            return normalize(forma)
              .replace(/[^a-z0-9\s-]/g, "")
              .replace(/\s+/g, "-");
          }

          async function fetchJson(url) {
            const res = await fetch(url, { headers: { "User-Agent": "pokelab-ai-github-action" } });
            if (!res.ok) throw new Error(`HTTP ${res.status} a ${url}`);
            return res.json();
          }

          async function getPokeApiId(entry) {
            // Si ja el tenim, no fem res
            if (entry.pokeapiId) return entry.pokeapiId;

            // Construïm slug: base o base-forma
            const base = entry.baseName ? slugifyName(entry.baseName) : slugifyName(entry.nom);
            const forma = entry.forma ? slugifyForma(entry.forma) : "";

            const slug = forma ? `${base}-${forma}` : base;

            try {
              const data = await fetchJson(`https://pokeapi.co/api/v2/pokemon/${slug}`);
              return data.id;
            } catch (e) {
              // Si falla (slug no existeix), provem només base (com a fallback)
              try {
                const data2 = await fetchJson(`https://pokeapi.co/api/v2/pokemon/${base}`);
                return data2.id;
              } catch (e2) {
                return null;
              }
            }
          }

          (async () => {
            const nom = pickField(body, "Nom");
            const joc = pickField(body, "Joc");
            const regio = pickField(body, "Regió");
            const naturalesa = pickField(body, "Naturalesa");
            const movimentsRaw =
              pickField(body, "Moviments (un per línia o separats per coma)") ||
              pickField(body, "Moviments");
            const notes = pickField(body, "Notes");

            // camps opcionals/derivats
            const baseName = pickField(body, "BaseName") || "";
            const forma = pickField(body, "Forma") || "";

            if (!nom) {
              console.log("No hi ha 'Nom' a l'issue; surto.");
              process.exit(0);
            }

            const path = "data/pokedex.json";
            let data = [];
            if (fs.existsSync(path)) {
              const raw = fs.readFileSync(path, "utf8").trim();
              if (raw) data = JSON.parse(raw);
            }

            if (!Array.isArray(data)) {
              // compatibilitat si algun dia fos { pokemon: [] }
              data = data.pokemon ?? [];
            }

            const key = `${normalize(nom)}|${normalize(joc)}`;
            const idx = data.findIndex(p => `${normalize(p.nom)}|${normalize(p.joc)}` === key);

            // Entry nova o existent
            const entry = idx >= 0 ? { ...data[idx] } : {};

            // Assignem camps (sense trepitjar si ja hi ha valor i el nou és buit)
            function setIfProvided(field, value) {
              if (value && value.trim() !== "") entry[field] = value.trim();
            }

            setIfProvided("nom", nom);
            setIfProvided("joc", joc);
            setIfProvided("regio", regio);
            setIfProvided("naturalesa", naturalesa);
            setIfProvided("notes", notes);

            // moviments: si arriba "_No response_" el convertim a []
            const movs = splitList(movimentsRaw).filter(x => x !== "_No response_");
            if (movimentsRaw && movs.length) entry.moviments = movs;
            else if (!entry.moviments) entry.moviments = [];

            // Derivats
            if (baseName) entry.baseName = baseName;
            if (forma) entry.forma = forma;

            // pokeapiId automàtic
            const pid = await getPokeApiId(entry);
            if (pid) entry.pokeapiId = pid;

            // Guardem (update o insert)
            if (idx >= 0) data[idx] = entry;
            else data.push(entry);

            fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
            console.log(idx >= 0 ? "Entrada actualitzada:" : "Entrada afegida:", entry);
          })();
          NODE

      - name: Commit i push si hi ha canvis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pokedex.json
          git diff --cached --quiet && echo "No hi ha canvis" && exit 0
          git commit -m "chore: omple pokeapiId automàtic (formes)"
          git push