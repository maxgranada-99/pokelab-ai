name: Afegir Pokémon a la Pokédex

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  add_pokemon:
    if: contains(github.event.issue.title, '[Pokédex] Afegir:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Actualitzar pokedex.json
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          const title = process.env.ISSUE_TITLE || "";
          const body = process.env.ISSUE_BODY || "";

          // --- helpers ---
          function pickField(text, label) {
            // suporta "Label: valor"
            const re = new RegExp(`^\\s*${label}\\s*:\\s*(.+)\\s*$`, "mi");
            const m = text.match(re);
            return m ? m[1].trim() : "";
          }

          function normalize(s) {
            return (s ?? "").toString().trim().toLowerCase();
          }

          function slugifyName(nom) {
            // "Typhlosion (Hisui)" -> base "typhlosion", form "hisui" => "typhlosion-hisui"
            // Treu accents, parèntesis i caràcters raros
            let s = (nom ?? "").toString().trim();

            // separa forma si hi ha ( ... )
            const m = s.match(/^(.*?)\s*\((.*?)\)\s*$/);
            let base = s;
            let form = "";
            if (m) {
              base = m[1].trim();
              form = m[2].trim();
            }

            function clean(x) {
              return x
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9\s-]/g, "")
                .trim()
                .replace(/\s+/g, "-");
            }

            base = clean(base);
            if (!form) return base;

            const formMap = {
              hisui: "hisui",
              "forma hisui": "hisui",
              alola: "alola",
              "forma alola": "alola",
              galar: "galar",
              "forma galar": "galar",
              paldea: "paldea",
              "forma paldea": "paldea",
            };

            const f = clean(form);
            const suffix = formMap[f] || f; // si no és una regió, provem tal qual

            return `${base}-${suffix}`;
          }

          async function getPokeApiId(nom) {
            const slug = slugifyName(nom);
            const url = `https://pokeapi.co/api/v2/pokemon/${slug}`;
            try {
              const res = await fetch(url, { headers: { "User-Agent": "pokelab-ai" } });
              if (!res.ok) return null;
              const json = await res.json();
              return json.id ?? null;
            } catch {
              return null;
            }
          }

          // --- entrada des de la issue ---
          const nom = pickField(body, "Nom") || title.replace("[Pokédex] Afegir:", "").trim();
          const joc = pickField(body, "Joc");
          const naturalesa = pickField(body, "Naturalesa");
          const movimentsRaw = pickField(body, "Moviments");
          const notes = pickField(body, "Notes");

          // moviments: separats per comes o línies
          const moviments = (movimentsRaw || "")
            .split(/\n|,/)
            .map(x => x.trim())
            .filter(Boolean);

          // llegim pokedex.json (pot ser array o objecte legacy)
          const path = "data/pokedex.json";
          const raw = fs.readFileSync(path, "utf8");
          let data = JSON.parse(raw);
          let arr = Array.isArray(data) ? data : (data.pokemon ?? []);
          if (!Array.isArray(arr)) arr = [];

          // IMPORTANT: aquí NO recalcularem dex/tipus/regions si ja ho tens en un altre pas.
          // Ens limitem a afegir camps + pokeapiId.
          // Si ja tens "dex" calculat per un altre mecanisme, el respectem.
          // Si no, el deixem buit (i la web ho pot ocultar).

          // clau d'unicitat: nom + joc (com fèieu abans)
          const key = `${normalize(nom)}__${normalize(joc)}`;
          const exists = arr.some(p => `${normalize(p.nom)}__${normalize(p.joc)}` === key);
          if (exists) {
            console.log("Ja existeix, no afegeixo duplicat:", key);
          } else {
            const pokeapiId = await getPokeApiId(nom);

            const entry = {
              nom,
              joc: joc || "",
              naturalesa: naturalesa || "",
              moviments,
              notes: notes || "",
              // NO toquem "dex", "tipus", "regio" si el teu altre workflow/script ja els posa.
              // Però si encara no existeixen, els deixem tal qual (buit).
              ...(pokeapiId ? { pokeapiId } : {})
            };

            arr.push(entry);
            console.log("Entrada afegida:", entry);
          }

          // tornem a escriure com a ARRAY (format nou)
          fs.writeFileSync(path, JSON.stringify(arr, null, 2) + "\n");
          NODE

      - name: Commit i push si hi ha canvis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pokedex.json
          git diff --cached --quiet && echo "No hi ha canvis" && exit 0
          git commit -m "chore: afegeix pokemon via issue (inclou pokeapiId)"
          git push