name: Migrar Pokédex (dex real + pokeapi_id + tipus)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Migrar data/pokedex.json amb PokéAPI
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const PATH = "data/pokedex.json";

            const typeMap = {
              normal: "Normal",
              fire: "Foc",
              water: "Aigua",
              electric: "Elèctric",
              grass: "Planta",
              ice: "Gel",
              fighting: "Lluita",
              poison: "Verí",
              ground: "Terra",
              flying: "Volador",
              psychic: "Psíquic",
              bug: "Bitxo",
              rock: "Roca",
              ghost: "Fantasma",
              dragon: "Drac",
              dark: "Sinistre",
              steel: "Acer",
              fairy: "Fada"
            };

            function normalizeText(s) {
              return (s ?? "")
                .toString()
                .trim()
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");
            }

            function slugBase(name) {
              return normalizeText(name)
                .replace(/\(.*?\)/g, "")
                .replace(/[^a-z0-9\s-]/g, "")
                .trim()
                .replace(/\s+/g, "-");
            }

            function slugPokemon(nom) {
              const raw = (nom ?? "").toString().trim();
              const base = slugBase(raw);

              const m = raw.match(/\((.*?)\)/);
              if (!m) return base;

              const form = normalizeText(m[1]);

              if (form.includes("hisui")) return `${base}-hisui`;
              if (form.includes("alola")) return `${base}-alola`;
              if (form.includes("galar")) return `${base}-galar`;
              if (form.includes("paldea")) return `${base}-paldea`;

              return base;
            }

            function cleanMoves(moviments) {
              if (!Array.isArray(moviments)) return moviments;
              return moviments
                .map(x => (x ?? "").toString().trim())
                .filter(Boolean)
                .filter(x => x !== "_No response_");
            }

            async function fetchPokemon(slug) {
              const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`);
              if (!res.ok) throw new Error(`PokéAPI ${res.status} per ${slug}`);
              return res.json();
            }

            async function fetchSpeciesId(speciesUrl) {
              const res = await fetch(speciesUrl);
              if (!res.ok) throw new Error(`Species ${res.status}`);
              const s = await res.json();
              return s.id;
            }

            const raw = fs.readFileSync(PATH, "utf8");
            let data = JSON.parse(raw);

            const pokemons = Array.isArray(data) ? data : (data.pokemon ?? []);

            let changed = false;

            for (const p of pokemons) {
              // neteja moviments
              const cleaned = cleanMoves(p.moviments);
              if (JSON.stringify(cleaned) !== JSON.stringify(p.moviments)) {
                p.moviments = cleaned;
                changed = true;
              }

              const needsDex = !p.dex || p.dex >= 10000; // arregla casos tipus 10233
              const needsPokeId = !p.pokeapi_id;
              const needsTypes = !Array.isArray(p.tipus) || p.tipus.length === 0;

              if (!needsDex && !needsPokeId && !needsTypes) continue;

              const slug = p.slug ? p.slug : slugPokemon(p.nom);
              try {
                const info = await fetchPokemon(slug);

                if (!p.slug) {
                  p.slug = slug;
                  changed = true;
                }

                if (needsPokeId) {
                  p.pokeapi_id = info.id;
                  changed = true;
                }

                if (needsTypes) {
                  const typesEn = (info.types || [])
                    .sort((a,b) => a.slot - b.slot)
                    .map(t => t.type?.name)
                    .filter(Boolean);

                  p.tipus = typesEn.map(t => typeMap[t] ?? t);
                  changed = true;
                }

                if (needsDex && info.species?.url) {
                  p.dex = await fetchSpeciesId(info.species.url);
                  changed = true;
                }
              } catch (e) {
                console.log(`⚠️ No he pogut migrar "${p.nom}" (slug: ${slug}) -> ${e.message}`);
              }
            }

            fs.writeFileSync(PATH, JSON.stringify(pokemons, null, 2) + "\n", "utf8");
            console.log(changed ? "✅ Migració feta (hi ha canvis)" : "ℹ️ No hi havia res per migrar");

      - name: Commit i push si hi ha canvis
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pokedex.json
          git commit -m "chore: migrar pokedex (dex real + pokeapi_id + tipus)"
          git push