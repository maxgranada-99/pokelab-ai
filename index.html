<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PokéLab AI — Pokédex personal</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 32px; }
    header { display:flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    h1 { margin: 0; }
    .muted { color:#555; }
    .box { margin: 16px 0 24px; max-width: 900px; }
    .progress-wrap { display:flex; align-items:center; gap: 12px; }
    .progress-bar {
      position: relative;
      width: min(520px, 100%);
      height: 14px;
      border: 1px solid #222;
      border-radius: 999px;
      overflow: hidden;
      background: #f2f2f2;
    }
    .progress-fill { height: 100%; width: 0%; background: #1a1a1a; transition: width .25s ease; }
    .progress-text { font-variant-numeric: tabular-nums; }
    input[type="search"] { padding: 8px 10px; width: min(520px, 100%); }

    ul { padding-left: 0; list-style: none; margin: 0; }
    li { margin: 10px 0; }
    .row {
      display:flex; align-items:center; gap: 12px;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
    }
    .row:hover { background: #f7f7f7; }
    .row img { flex: 0 0 auto; }

    .detail {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      background: #fafafa;
    }
    .detail-head { display:flex; gap: 14px; align-items:center; }
    .detail-head img { width: 120px; height: 120px; }
    .detail h3 { margin: 0 0 6px; }
    .grid {
      display:grid;
      grid-template-columns: 180px 1fr;
      gap: 6px 12px;
      margin-top: 10px;
    }
    .k { color:#444; }
    .v { color:#111; }
    .pill { display:inline-block; padding: 2px 8px; border:1px solid #ccc; border-radius: 999px; margin-right: 6px; }
    .close {
      margin-left:auto;
      border: 1px solid #bbb;
      border-radius: 10px;
      padding: 6px 10px;
      background: white;
      cursor:pointer;
    }
    .hidden { display:none; }

    .modal-overlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:flex; align-items:center; justify-content:center;
      padding: 24px;
      z-index: 9999;
    }

    .modal{
      width: min(860px, 100%);
      max-height: min(80vh, 720px);
      overflow:auto;
      background:#fff;
      border-radius: 14px;
      border: 1px solid #ddd;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      padding: 18px 18px 16px;
      position: relative;
    }

    .modal-title { margin: 0; }

    .modal-close{
      position:absolute;
      top: 10px; right: 12px;
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid #bbb;
      background: white;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }
    .modal-close:hover{ background:#f0f0f0; }

    .modal-body{ margin-top: 12px; }
    .close:hover { background:#f0f0f0; }
  </style>
</head>

<body>
  <header>
    <h1>Pokédex personal</h1>
    <span class="muted" id="count">Carregant…</span>
  </header>

  <p class="muted">Dades: <code>data/pokedex.json</code></p>

  <div class="box">
  <div class="progress-wrap">
    <div class="progress-bar" aria-label="Progrés Pokédex">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text">
      <span id="progressText">—</span>
      <span class="muted"> · </span>
      <span id="percent">0%</span>
    </div>
  </div>
</div>

  <input id="q" type="search" placeholder="Cerca per nom (ex.: gengar, leafeon)" />

  <section class="box" id="detailSection" style="display:none;">
    <h2>Fitxa</h2>
    <div id="detail" class="muted">Clica un Pokémon de la llista per veure’n el detall.</div>
  </section>

  <section class="box">
    <h2>Fitxa</h2>
    <div id="detail" class="muted">Clica un Pokémon de la llista per veure’n el detall.</div>
  </section>

  <section class="box">
    <h2>Llista</h2>
    <ul id="list"></ul>
  </section>

<!-- Modal Fitxa -->
<div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button id="modalClose" class="modal-close" aria-label="Tanca">×</button>
    <h2 id="modalTitle" class="modal-title"></h2>
    <div id="modalSubtitle" class="muted" style="margin-top:-6px;"></div>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

  <script src="./script.js"></script>
</body>
</html>
