<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PokéLab AI — Pokédex personal</title>
  <style>
    :root{
      --content-w: 980px; /* si vols més ample: 1040px */
    }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:#7f1d1d; padding:40px 0; }
        /* ====== SHELL: dispositiu retro ====== */
    :root{
      --shell:#7b1b1b;
      --shell-dark:#611313;
      --shell-light:#a83434;
      --screen:#f6f1e6;
      --ink:#1b1b1b;
    }

    body{ color: var(--ink); }

    main.shell{
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(0,0,0,.10)),
        radial-gradient(1200px 700px at 20% 10%, rgba(255,255,255,.18), transparent 55%),
        radial-gradient(900px 600px at 80% 0%, rgba(0,0,0,.18), transparent 55%),
        var(--shell);
      border: 2px solid rgba(0,0,0,.25);
      border-radius: 26px;
      padding: 22px 22px 26px;
      box-shadow:
        0 24px 70px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.25),
        inset 0 -10px 25px rgba(0,0,0,.18);
      position: relative;
    }

    /* cargols (decoració) */
    main.shell::before,
    main.shell::after{
      content:"";
      position:absolute;
      width:12px;height:12px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff, #b9b9b9 45%, #6b6b6b 80%);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.35);
      top:14px;
    }
    main.shell::before{ left:14px; }
    main.shell::after{ right:14px; }

    /* pantalla interior */
    .shell .screen{
      background:
        linear-gradient(180deg, rgba(255,255,255,.55), rgba(0,0,0,.05)),
        var(--screen);
      border-radius: 18px;
      border: 2px solid rgba(0,0,0,.18);
      padding: 16px 16px 18px;
      box-shadow:
        inset 0 10px 20px rgba(0,0,0,.08),
        0 10px 25px rgba(0,0,0,.18);
    }

    /* capçalera estil “etiqueta” */
    .shell header{
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(0,0,0,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
    }

    .shell .muted{ color: rgba(27,27,27,.70); }
    header{
      display:flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 18px;
    }
    h1 { margin: 0; }
    .muted { color:#555; }
    .box{
      max-width: var(--content-w);
      margin: 16px auto 18px;  /* clau: auto centra */
    }

    .progress-wrap{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;   /* centra tot el grup */
    }
    .progress-bar{
      position:relative;
      width:100%;
      max-width:420px;
      height:32px;

      border-radius:999px;
      overflow:hidden;

      background:
        linear-gradient(to bottom,#e53935 0%,#e53935 50%,#ffffff 50%,#ffffff 100%);

      border:3px solid #222;
    }
    .progress-bar::before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:50%;
      height:3px;
      background:#222;
      transform:translateY(-50%);
    }
    .progress-bar::after{
      content:"";
      position:absolute;
      top:50%;
      left:50%;
      width:20px;
      height:20px;
      border-radius:50%;
      background:white;
      border:3px solid #222;
      transform:translate(-50%,-50%);
    }
    .progress-fill { height: 100%; width: 0%; background: #1a1a1a; transition: width .25s ease; }
    .progress-text { font-variant-numeric: tabular-nums; }

    .toolbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:center; /* <-- això centra la barra i el botó */
      flex-wrap:wrap;
    }
    input[type="search"] { padding: 8px 10px; width: min(520px, 100%); }

    /* GRID */
    #grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap:10px;
    }
    .cell {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 8px 8px 6px;
      background: #fff;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-height: 108px;
    }
    .cell:hover { background: #f7f7f7; }
    .cell.locked { cursor: default; opacity: 0.55; background: #fafafa; }
    .cell .dex { font-size: 12px; color:#666; font-variant-numeric: tabular-nums; }
    .cell .name { font-size: 12px; text-align: center; line-height: 1.1; }
    .cell img { width: 48px; height: 48px; image-rendering: pixelated; }

    /* DETAIL (per ara, panell fix simple i robust) */
    #detail {
      max-width: 1100px;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 14px;
      background: #fafafa;
    }
    .detail-head { display:flex; gap: 14px; align-items:center; }
    .detail-head img { width: 96px; height: 96px; image-rendering: pixelated; }
    .detail h2 { margin: 0 0 6px; }
    .detail .line { margin: 3px 0; }
    .pill { display:inline-block; padding: 2px 8px; border:1px solid #ccc; border-radius: 999px; margin-right: 6px; }

    button {
      border: 1px solid #bbb;
      border-radius: 10px;
      padding: 8px 10px;
      background: white;
      cursor:pointer;
    }
    button:hover { background:#f0f0f0; }
    .hidden { display: none; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .hidden {
      display: none;
    }

    .modal {
      background: #fff;
      width: min(600px, 90%);
      max-height: 80vh;
      overflow-y: auto;
      border-radius: 12px;
      padding: 20px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .modal-close{
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid #bbb;
      background: white;
      cursor: pointer;
      font-size: 22px;
    }

    .modal-close:hover{
      background:#f2f2f2;
    }
      /* ===== TEMA POKÉMON (només estètica) ===== */

    body {
      background:
        radial-gradient(900px 500px at 10% 0%, rgba(255,203,5,.15), transparent 60%),
        radial-gradient(900px 500px at 90% 0%, rgba(42,117,187,.15), transparent 60%),
        linear-gradient(180deg, #f6f7fb, #eef1f8);
    }

    .progress-fill {
      background: linear-gradient(90deg, #e3350d, #ffcb05, #2a75bb);
    }

    .cell {
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .cell:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(15,23,42,.12);
    }

    .cell .dex {
      background: rgba(0,0,0,0.04);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .cell img {
      filter: drop-shadow(0 8px 10px rgba(15,23,42,.18));
    }

    #detail {
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
    }

    .detail-head img {
      filter: drop-shadow(0 14px 18px rgba(15,23,42,.22));
    }

    button {
      border-radius: 999px;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(15,23,42,.08);
  }
      /* Pokéball mini al costat del nom capturat */
    .cell:not(.locked) .name::before{
      content:"";
      display:inline-block;
      width:14px;
      height:14px;
      margin-right:6px;
      border-radius:50%;
      vertical-align:-2px;

      background:
        radial-gradient(circle at 50% 50%, #fff 0 35%, #111 35% 45%, transparent 45%),
        linear-gradient(#e3350d 0 48%, #111 48% 52%, #fff 52% 100%);

      box-shadow: 0 1px 2px rgba(0,0,0,.25);
    }
      /* ===== POKÉDEX CLÀSSICA SUAU ===== */

    body{
      background: linear-gradient(180deg, #c62828, #ad1f1f);
    }

    /* Cos principal (carcassa Pokédex) */
    header,
    .box{
      background: #d32f2f;
      padding: 14px 18px;
      border-radius: 18px;
      box-shadow:
        inset 0 0 0 3px #8e1c1c,
        0 12px 30px rgba(0,0,0,.25);
    }

    /* Pantalla interior */
    #detail,
    #grid,
    .progress-wrap,
    .toolbar{
      background: #f7f4ec;
      border-radius: 14px;
      padding: 12px;
      box-shadow: inset 0 0 0 2px #d8d2c4;
    }

    /* Barra progrés */
    .progress-bar{
      border: 2px solid #333;
      background: #e0e0e0;
    }

    .progress-fill{
      background: #2a75bb;
    }

    /* Cel·les tipus pantalla LCD */
    .cell{
      background: #fffdf7;
      border: 2px solid #d0c8b8;
    }

    .cell.locked{
      background: #eee9df;
      opacity: .65;
    }

    /* Botons retro suaus */
    button{
      background:#ded8cc;
      border:2px solid #bbb5a7;
      border-radius:8px;
      font-weight:700;
      box-shadow: inset 0 -3px 0 #cfc7b9;
    }

    button:focus,
    button:focus-visible{
      outline:none;
      box-shadow:0 0 0 4px rgba(42,117,187,.25);
    }

    button:active{
      box-shadow: inset 0 3px 0 #cfc7b9;
    }

    /* Títol */
    h1{
      color: #fff;
      text-shadow: 0 2px 0 #8e1c1c;
    }
      /* ===== INTEGRACIÓ (menys totxos) ===== */

    /* Header més net */
    header{
      background: transparent;
      padding: 0;
      box-shadow: none;
    }
    h1{ color:#fff; text-shadow: 0 2px 0 rgba(0,0,0,.25); }
    #count{ color: rgba(255,255,255,.85); }

    /* Un panell interior únic */
    .box{
      background: transparent;
      box-shadow: none;
      padding: 0;
      margin: 14px 0;
    }

    /* Crea “pantalla” comuna agrupant seccions visuals */
    .progress-wrap,
    .toolbar,
    #detail,
    #grid{
      background: #f7f4ec;
      box-shadow: inset 0 0 0 2px #d8d2c4;
    }

    /* Fes que progress + toolbar + detail semblin una sola peça */
    .progress-wrap{ border-radius: 18px 18px 0 0; padding: 14px; }
    .toolbar{ border-radius: 0; padding: 12px 14px; border-top: 1px solid #ddd6c8; }
    #detail{ border-radius: 0; padding: 14px; border-top: 1px solid #ddd6c8; }
    #grid{
      border-radius: 0 0 18px 18px;
      padding: 14px;
      border-top: 1px solid #ddd6c8;
    }

    /* Text dins “pantalla” */
    body{ color:#2b2b2b; }
    .muted{ color:#6b6b6b; }

    /* Cel·les menys “caixetes” */
    .cell{
      border: 1px solid #d7cfbf;
      box-shadow: none;
    }
    .cell:hover{ background:#fff; transform: translateY(-1px); }
      /* ====== SUAVITZAR I INTEGRAR (enganxa al final del <style>) ====== */

    /* 1) Fons més suau i menys “bloc vermell” */
    body{
  background: radial-gradient(1200px 700px at 20% 10%, rgba(255,255,255,.22), transparent 55%),
              radial-gradient(900px 600px at 80% 20%, rgba(0,0,0,.08), transparent 60%),
              linear-gradient(180deg, #b72727, #8f1f1f);
    }

    /* 2) Les seccions deixen de ser “totxos”: transparència + menys vora */
    .box{
      background:rgba(255,255,255,.75);
      border-radius:16px;
      padding:14px;

      max-width:1100px;
      margin:18px auto;
    }

    /* 3) Controls i targetes més “tous” i coherents */
    #detail{
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(0,0,0,.08);
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .progress-bar,
    input[type="search"],
    button{
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.18);
      box-shadow: 0 6px 14px rgba(0,0,0,.08);
    }

    /* Grid: una mica més d’aire i targetes menys “marcades” */
    #grid{ gap: 12px; }

    .cell{
      border: 1px solid rgba(0,0,0,.10);
      box-shadow: 0 8px 18px rgba(0,0,0,.06);
    }

    .cell:hover{
      transform: translateY(-2px);
    }

        /* ===== DISPOSITIU POKÉDEX ===== */

    .device{
      max-width:1200px;
      margin:auto;
      padding:28px;
      background:linear-gradient(180deg,#b52d2d,#8f1f1f);
      border-radius:28px;
      box-shadow:
        inset 0 8px 16px rgba(255,255,255,.15),
        inset 0 -8px 20px rgba(0,0,0,.25),
        0 30px 60px rgba(0,0,0,.45);
    }

    .device-screen{
      background:#efe9dd;
      border-radius:18px;
      padding:20px;
      box-shadow:
        inset 0 6px 12px rgba(0,0,0,.15),
        0 10px 25px rgba(0,0,0,.25);
    }

    /* cargols decoratius */
    .device::before,
    .device::after{
      content:"";
      position:absolute;
      width:12px;
      height:12px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%,#fff,#bbb 50%,#666);
      top:18px;
    }

    .device::before{ left:18px; }
    .device::after{ right:18px; }

    /* ===== FRONTISSA POKÉDEX ===== */

    .device{
      position:relative;
    }

    .device::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:90px;
      height:6px;

      background:linear-gradient(
        to bottom,
       rgba(0,0,0,.4),
        rgba(255,255,255,.2),
        rgba(0,0,0,.4)
      );

      box-shadow:
        0 2px 6px rgba(0,0,0,.4),
        inset 0 1px 2px rgba(255,255,255,.4);
    }
      /* ===== THEME: Pokédex App Moderna (A) ===== */
    :root{
      --bg: #F6F7FB;
      --card: #FFFFFF;
      --card2: #F3F4F6;
      --text: #1F2937;
      --muted: #6B7280;
      --border: #E5E7EB;

      /* accents Pokémon */
      --blue: #2A75BB;
      --yellow: #FFCB05;
      --red: #E3350D;

      --shadow: 0 10px 25px rgba(17,24,39,.10);
      --shadow2: 0 6px 16px rgba(17,24,39,.08);
      --radius: 16px;
    }

    /* Fons app */
    body{
      background: radial-gradient(900px 500px at 20% 10%, rgba(42,117,187,.10), transparent 55%),
                  radial-gradient(900px 500px at 80% 0%, rgba(255,203,5,.10), transparent 55%),
                  var(--bg);
      color: var(--text);
    }

    /* Si tens wrapper device, el convertim en contenidor app */
    .device{
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    .device-screen{
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 !important;
    }

    /* Layout: centrat i net */
    header, .progress-wrap, .toolbar, #detail, #grid{
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Capçalera moderna */
    header{
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 6px 2px 0 !important;
    }
    h1{
      color: var(--text) !important;
      text-shadow: none !important;
      letter-spacing: .2px;
    }
    #count{ color: var(--muted) !important; }

    /* Progrés com a “status” */
    .progress-wrap{
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      padding: 14px 14px !important;
      box-shadow: var(--shadow2) !important;
    }
    .progress-bar{
      border: 1px solid var(--border) !important;
      background: var(--card2) !important;
    }
    .progress-fill{
      background: linear-gradient(90deg, var(--blue), var(--yellow)) !important;
    }
    .progress-text{ color: var(--muted) !important; }

    /* Toolbar integrada */
    .toolbar{
      background: transparent !important;
      padding: 0 !important;
    }
    input[type="search"]{
      border: 1px solid var(--border) !important;
      border-radius: 999px !important;
      background: var(--card) !important;
      box-shadow: var(--shadow2) !important;
      color: var(--text) !important;
    }
    input[type="search"]::placeholder{ color: #9CA3AF; }

    #addBtn{
      border: 1px solid rgba(42,117,187,.25) !important;
      background: rgba(42,117,187,.12) !important;
      color: var(--blue) !important;
      border-radius: 999px !important;
      box-shadow: var(--shadow2) !important;
      font-weight: 600;
    }
    #addBtn:hover{ background: rgba(42,117,187,.18) !important; }

    /* Grid i cel·les: app cards */
    #grid{
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      box-shadow: none !important;
    }
    .cell{
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 14px !important;
      box-shadow: var(--shadow2) !important;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .cell:hover{
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .cell.locked{
      background: rgba(255,255,255,.55) !important;
      box-shadow: none !important;
    }
    .cell .dex{ color: var(--muted) !important; }
    .cell .name{ color: var(--text) !important; }

    /* (Per ara) el panell #detail el deixem discret (després el traurem) */
    #detail{
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow2) !important;
    }

    /* Modal modern */
    .modal-overlay{
      background: rgba(17,24,39,.55) !important;
      backdrop-filter: blur(6px);
    }
    .modal{
      border-radius: 18px !important;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 30px 80px rgba(0,0,0,.35) !important;
    }
    .modal-close{
      border-radius: 999px !important;
      border: 1px solid var(--border) !important;
      background: var(--card) !important;
    }
    .modal-close:hover{ background: var(--card2) !important; }
        /* ===== Font Pokémon ===== */

    @font-face {
      font-family: "PokemonSolid";
      src: url("./assets/fonts/Pokemon Solid.ttf") format("truetype");
      font-display: swap;
    }

    header h1{
      margin:0;
      text-align:center;
      font-size: clamp(44px, 6vw, 78px);
      line-height:1;

      font-family:"PokemonSolid", system-ui, sans-serif;
      letter-spacing:2px;

      color:#FFCB05 !important;
      -webkit-text-stroke: 10px #2A75BB;
      paint-order: stroke fill;
      text-shadow: 0 7px 0 rgba(42,117,187,.35);
    }
    /* Pokéball progress */

.pokeball-progress{
  display:flex;
  justify-content:center;
  margin-top:14px;
}

.pokeball{
  width:64px;
  height:64px;
  border-radius:50%;
  border:4px solid #222;
  position:relative;
  overflow:hidden;

  background:
    linear-gradient(
      to bottom,
      #e53935 0%,
      #e53935 50%,
      white 50%,
      white 100%
    );
}
      .pokeball::before{
      content:"";
      position:absolute;
      top:50%;
      left:0;
      right:0;
      height:4px;
      background:#222;
      transform:translateY(-50%);
    }

    .pokeball::after{
      content:"";
      position:absolute;
      top:50%;
      left:50%;
      width:16px;
      height:16px;
      background:white;
      border:4px solid #222;
      border-radius:50%;
      transform:translate(-50%,-50%);
    }

    .pokeball-fill{
      position:absolute;
      bottom:0;
      left:0;
      width:100%;
      height:0%;
      background:rgba(255,215,0,0.45);
      transition:height .4s ease;
    }
        /* NEW CAPTURE (quan apareix per primer cop) */
    @keyframes capturePop {
      0%   { transform: translateY(6px) scale(.98); opacity: 0; }
      60%  { transform: translateY(-2px) scale(1.02); opacity: 1; }
      100% { transform: translateY(0) scale(1); }
    }
    @keyframes captureGlow {
      0%   { box-shadow: 0 0 0 rgba(59,130,246,0); }
      60%  { box-shadow: 0 14px 30px rgba(59,130,246,.18); }
      100% { box-shadow: 0 0 0 rgba(59,130,246,0); }
    }
    .cell.new-capture {
      animation: capturePop 520ms ease-out both, captureGlow 900ms ease-out both;
    }
        /* === POKÉBALL PROGRESS (opció B) === */
    .pokeball-progress{
      display:flex;
      justify-content:center;
      margin: 10px 0 2px;
    }

    .pokeball{
      --p: 0;                 /* 0..1 (JS ho actualitza) */
      width: 74px;
      height: 74px;
      border-radius: 50%;
      position: relative;
      border: 4px solid #1c1c1c;
      box-shadow: 0 10px 26px rgba(0,0,0,.12);
      overflow: hidden;
    }

    /* “omplir” el vermell segons el progrés (de 0 a 100%) */
    .pokeball-fill{
      position:absolute;
      inset:0;
      background:
        conic-gradient(
          #d83b2f calc(var(--p) * 360deg),
          #f7f7f7 0
        );
    }

    /* línia negra del mig */
    .pokeball::before{
      content:"";
      position:absolute;
      left:-10%;
      right:-10%;
      top:50%;
      height: 10px;
      transform: translateY(-50%);
      background:#1c1c1c;
      z-index: 2;
    }

    /* botó central */
    .pokeball::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width: 22px;
      height: 22px;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      background: #f7f7f7;
      border: 4px solid #1c1c1c;
      box-shadow: inset 0 0 0 3px #f7f7f7;
      z-index: 3;
    }
        /* Pokéball clicable */
    #addPokemonBtn { cursor: pointer !important; }
    #captureBtn:active { transform: scale(0.98); }
  </style>
</head>

<body>

<div class="device">
<div class="device-screen">

  <header>
    <h1>Pokédex personal</h1>
  </header>

  <div class="box progress-wrap">
    <div class="progress-bar" aria-label="Progrés Pokédex">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">—</div>
  </div>
  <div class="pokeball-progress">
    <div class="pokeball" id="addPokemonBtn" role="button" tabindex="0" aria-label="Afegir Pokémon">
      <div class="pokeball-fill" id="pokeballFill"></div>
    </div>
  </div>

  <div class="box toolbar">
    <input id="q" type="search" placeholder="Cerca per nom (ex.: starmie, melmetal)" />
  </div>

  <section class="box hidden">
    <div id="detail" class="muted">Clica un Pokémon capturat per veure’n el detall.</div>
  </section>

  <section class="box">
    <div id="grid" aria-label="Graella Pokédex"></div>
  </section>

  </div>
  </div>

  <script src="./script.js?v=1" defer></script>
  <!-- MODAL -->
  <div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="modalClose" class="modal-close" aria-label="Tancar">×</button>
      <h2 id="modalTitle" class="modal-title"></h2>
      <div id="modalSubtitle" class="muted" style="margin-top:-6px;"></div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>
</body>
</html>
